# GoReleaser config. Builds cross-platform binaries on a pushed tag (v*),
# publishes a GitHub Release, and updates the Homebrew tap formula and the
# NUR package.
# Docs: https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: md2
    main: .
    binary: md2
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: md2
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

# Native Linux packages built from the compiled linux binaries and attached to
# the GitHub Release. nfpm auto-skips non-linux builds, so this packages just
# linux/amd64 and linux/arm64. No external repo/token needed.
nfpms:
  - id: md2
    package_name: md2
    ids:
      - md2
    formats:
      - deb
      - rpm
      - apk
    # Distro-conventional filenames (e.g. md2_1.2.3_amd64.deb,
    # md2-1.2.3.x86_64.rpm, md2_1.2.3_x86_64.apk).
    file_name_template: "{{ .ConventionalFileName }}"
    maintainer: "Luiz Henrique Rapatao <rapatao@rapatao.com>"
    homepage: "https://github.com/rapatao/md2"
    description: "Convert markdown files to PDF, HTML, and text"
    license: MIT
    bindir: /usr/bin

# Container images. Both variants are built per-arch from the already-compiled
# binaries (no in-image compile), then combined into multi-arch manifests.
#   :latest / :<version>       full  — Debian + Chromium, every feature works
#   :slim   / :<version>-slim  slim  — distroless, no browser features
# Published to GHCR. arm64 images build under QEMU emulation on the amd64 runner.
dockers:
  - id: md2-full-amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/rapatao/md2:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Convert markdown files to PDF, HTML, and text"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/rapatao/md2"
      - "--label=org.opencontainers.image.licenses=MIT"
  - id: md2-full-arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/rapatao/md2:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Convert markdown files to PDF, HTML, and text"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/rapatao/md2"
      - "--label=org.opencontainers.image.licenses=MIT"
  - id: md2-slim-amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.slim
    use: buildx
    image_templates:
      - "ghcr.io/rapatao/md2:{{ .Version }}-slim-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Convert markdown files to PDF, HTML, and text (slim, no browser features)"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/rapatao/md2"
      - "--label=org.opencontainers.image.licenses=MIT"
  - id: md2-slim-arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.slim
    use: buildx
    image_templates:
      - "ghcr.io/rapatao/md2:{{ .Version }}-slim-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Convert markdown files to PDF, HTML, and text (slim, no browser features)"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/rapatao/md2"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/rapatao/md2:{{ .Version }}"
    image_templates:
      - "ghcr.io/rapatao/md2:{{ .Version }}-amd64"
      - "ghcr.io/rapatao/md2:{{ .Version }}-arm64"
  # Empty name_template on a prerelease → goreleaser skips the manifest, so the
  # floating :latest tag never moves to a prerelease.
  - name_template: "{{ if not .Prerelease }}ghcr.io/rapatao/md2:latest{{ end }}"
    image_templates:
      - "ghcr.io/rapatao/md2:{{ .Version }}-amd64"
      - "ghcr.io/rapatao/md2:{{ .Version }}-arm64"
  - name_template: "ghcr.io/rapatao/md2:{{ .Version }}-slim"
    image_templates:
      - "ghcr.io/rapatao/md2:{{ .Version }}-slim-amd64"
      - "ghcr.io/rapatao/md2:{{ .Version }}-slim-arm64"
  - name_template: "{{ if not .Prerelease }}ghcr.io/rapatao/md2:slim{{ end }}"
    image_templates:
      - "ghcr.io/rapatao/md2:{{ .Version }}-slim-amd64"
      - "ghcr.io/rapatao/md2:{{ .Version }}-slim-arm64"

# Keyless cosign signatures over the pushed multi-arch manifests, mirroring the
# checksum signing below.
docker_signs:
  - cmd: cosign
    artifacts: manifests
    args:
      - sign
      - "--yes"
      - "${artifact}@${digest}"

checksum:
  name_template: "checksums.txt"

signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    artifacts: checksum

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - name: md2
    repository:
      owner: rapatao
      name: homebrew-tap
      token: "{{ .Env.GH_RELEASE_TOKEN }}"
    homepage: "https://github.com/rapatao/md2"
    description: "Convert markdown files to PDF, HTML, and text"
    # Strip the macOS quarantine flag so the unsigned binary runs without
    # a Gatekeeper prompt.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/md2"]
          end

nix:
  - name: md2
    ids:
      - md2
    repository:
      owner: rapatao
      name: nur-packages
      token: "{{ .Env.GH_RELEASE_TOKEN }}"
    path: pkgs/md2/default.nix
    homepage: "https://github.com/rapatao/md2"
    description: "Convert markdown files to PDF, HTML, and text"
    license: "mit"
    main_program: md2

# Arch User Repository. goreleaser generates the PKGBUILD + .SRCINFO from the
# already-built linux tar.gz archives (no build-from-source; md2 is CGO-free)
# and pushes them to aur.archlinux.org over SSH. The "-bin" suffix is required
# by AUR guidelines for prebuilt-binary packages whose sources are public.
# Requires a one-time AUR account + registered SSH key, and the AUR_KEY secret
# (passwordless private key). See: https://goreleaser.com/customization/aur/
aurs:
  - name: md2-bin
    ids:
      - md2
    homepage: "https://github.com/rapatao/md2"
    description: "Convert markdown files to PDF, HTML, and text"
    license: MIT
    maintainers:
      - "Luiz Henrique Rapatao <rapatao@rapatao.com>"
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/md2-bin.git"
    # Don't push to AUR on prereleases (mirrors the prerelease guard on the
    # docker_manifests :latest / :slim tags).
    skip_upload: auto
    provides:
      - md2
    conflicts:
      - md2
    # Chromium is only needed for the PDF browser fallback (non-BMP glyphs such
    # as emoji); the binary runs standalone otherwise.
    optdepends:
      - "chromium: PDF rendering fallback for non-BMP glyphs"
    # Install the binary and, since MIT is a "custom" license on Arch, the
    # license text (required by AUR guidelines; keeps namcap clean). LICENSE
    # ships inside the release tarball alongside the md2 binary.
    package: |-
      install -Dm755 "./md2" "${pkgdir}/usr/bin/md2"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/md2-bin/LICENSE"

release:
  github:
    owner: rapatao
    name: md2
  draft: false
  prerelease: auto
