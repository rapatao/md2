# GoReleaser config. Builds cross-platform binaries on a pushed tag (v*),
# publishes a GitHub Release, and updates the Homebrew tap formula and the
# NUR package.
# Docs: https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: md2
    main: .
    binary: md2
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: md2
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    artifacts: checksum

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - name: md2
    repository:
      owner: rapatao
      name: homebrew-tap
      token: "{{ .Env.GH_RELEASE_TOKEN }}"
    homepage: "https://github.com/rapatao/md2"
    description: "Convert markdown files to PDF, HTML, and text"
    # Strip the macOS quarantine flag so the unsigned binary runs without
    # a Gatekeeper prompt.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/md2"]
          end

nix:
  - name: md2
    ids:
      - md2
    repository:
      owner: rapatao
      name: nur-packages
      token: "{{ .Env.GH_RELEASE_TOKEN }}"
    path: pkgs/md2/default.nix
    homepage: "https://github.com/rapatao/md2"
    description: "Convert markdown files to PDF, HTML, and text"
    license: "mit"
    main_program: md2

release:
  github:
    owner: rapatao
    name: md2
  draft: false
  prerelease: auto
